spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver  # 注意：是 cj 版本
    url: jdbc:mysql://localhost:3306/pickle?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&useCursorFetch=true&defaultFetchSize=10000&allowMultiQueries=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 20
      maximum-pool-size: 50  # 增加连接池大小，支持并行查询
      connection-timeout: 60000 # 增加超时时间
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis配置
  data:
    redis:
      host: localhost           # Redis服务器地址
      port: 6379                # Redis服务器端口
      password: 123456          # 密码（如果没有则留空）
      database: 0               # 数据库索引（默认0）
      timeout: 2000ms           # 连接超时时间
      lettuce:                  # 使用Lettuce连接池（Spring Boot默认）
        pool:
          max-active: 8         # 最大连接数
          max-idle: 8           # 最大空闲连接
          min-idle: 2           # 最小空闲连接
          max-wait: -1ms        # 最大等待时间（-1表示无限）

  # 缓存配置
  cache:
    type: redis                 # 指定缓存类型为Redis
    redis:
      time-to-live: 1800000     # 缓存过期时间（毫秒），30分钟
      cache-null-values: false  # 是否缓存空值（防穿透用）

mybatis:
  mapper-locations: classpath:mapper/sys/*Mapper.xml
  type-aliases-package: com.pickle.sys.bean  # 建议指定具体包名，而不是通配符
  configuration:
    default-fetch-size: 10000  # 游标批量获取大小
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 添加日志配置查看 SQL 执行
logging:
  level:
    com.pickle.sys.mapper: debug